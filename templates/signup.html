<!DOCTYPE html>
<html>
<body>
    <nav><a href="/">Home</a></nav>
    <h2>Create Account</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}<p style="color:red">{{ messages[0] }}</p>{% endif %}
    {% endwith %}

    <form method="post">
        <input type="text" name="u" placeholder="Username" required><br>
        <input type="password" name="p1" placeholder="Password" required><br>
        <input type="password" name="p2" placeholder="Repeat Password" required><br>
        <button type="submit">Sign Up</button>
    </form>
</body>
</html>
