<!DOCTYPE html>
<html>
<head>
    <title>Edit Post</title>
    <style>
        body { background: #fcfcfc; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .edit-box { background: white; padding: 30px; border-radius: 20px; border: 2px solid #fde2e4; width: 400px; }
        textarea { width: 100%; height: 100px; border: 1px solid #ddd; border-radius: 10px; padding: 10px; margin: 10px 0; }
        .btn-pink { background: #ff4d6d; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="edit-box">
        <h2 style="color: #ff4d6d; margin-top: 0;">Edit Your Chirp</h2>
        <form action="/edit_message/{{ message.id }}" method="post">
            <textarea name="content">{{ message.content }}</textarea>
            <button type="submit" class="btn-pink">Save Changes</button>
            <a href="/" style="color: #888; text-decoration: none; margin-left: 10px;">Cancel</a>
        </form>
    </div>
</body>
</html>
