{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 50px auto; padding: 30px; background: white; border: 4px solid #ffc2d1; border-radius: 20px;">
    <h2 style="color: #000; font-family: sans-serif;">Edit Your Message</h2>
    
    <form action="/edit_message/{{ message.id }}" method="post">
        <textarea name="content" required style="width: 100%; height: 120px; border: 2px solid #ffc2d1; border-radius: 10px; padding: 10px;">{{ message.content }}</textarea>
        
        <div style="margin-top: 20px;">
            <button type="submit" style="background: #000; color: #fff; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold;">
                Save Changes
            </button>
            <a href="/" style="margin-left: 10px; color: #000; text-decoration: none; font-weight: bold;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
