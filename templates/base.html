<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BirdieMessages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff0f3;
        }

        header {
            background: #ffe5ec;
            padding: 20px;
            border-bottom: 3px solid #ffc2d1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            margin-right: 10px;
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        nav a:hover {
            background: #ffc2d1;
            padding: 2px 5px;
            border-radius: 5px;
        }

        .lang a {
            margin-left: 8px;
            text-decoration: none;
            font-weight: bold;
            color: #333;
        }

        .container {
            padding: 20px;
        }
    </style>
</head>

<body>

<header>
    <div>
        <h2 style="margin:0;">BirdieMessages</h2>
    </div>

    <nav>
        <!-- SAFE translation usage -->
        <a href="/">{{ t.get('home', 'Home') }}</a>

        {% if user %}
            <a href="/create_message">{{ t.get('post', 'Post') }}</a>
            <a href="/logout">{{ t.get('logout', 'Logout') }}</a>
        {% else %}
            <a href="/login">{{ t.get('login', 'Login') }}</a>
            <a href="/register">{{ t.get('register', 'Register') }}</a>
        {% endif %}
    </nav>

    <!-- LANGUAGE SWITCHER -->
    <div class="lang">
        <a href="/set_lang/en">EN</a>
        <a href="/set_lang/fr">FR</a>
        <a href="/set_lang/zh">中文</a>
    </div>
</header>

<!-- PAGE CONTENT -->
<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
