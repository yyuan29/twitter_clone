<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdieMessages</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fcfcfc;
            color: #333;
        }

        header {
            background: #fde2e4;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #fad2d6;
        }

        .logo {
            width: 60px;
        }

        h1 {
            margin: 5px 0;
            font-weight: 800;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #444;
            font-weight: 600;
        }

        nav a:hover {
            color: #ff4d6d;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
    </style>
</head>

<body>

<header>
    <img src="/static/logo.png" class="logo">
    <h1>BirdieMessages</h1>

    <nav>
        {% if user %}
            <a href="/">Home</a>
            <a href="/create_message">Post</a>
            <a href="/profile/{{ user }}">Profile</a>
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/">Home</a>
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        {% endif %}
    </nav>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
