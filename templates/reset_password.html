{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto; padding: 40px; background-color: #ffffff; border: 4px solid #ffc2d1; border-radius: 20px; box-shadow: 0 10px 0 #ffe5ec;">
    
    <h1 style="color: #000000; font-family: 'Arial Black', sans-serif; text-align: center; margin-bottom: 30px;">Reset Password</h1>

    <form action="/reset_password" method="post" style="display: flex; flex-direction: column; gap: 15px;">
       <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrf_token') }}">
        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Old Password</label>
            <input type="password" name="old_password" required style="width: 100%; padding: 12px; border: 2px solid #ffc2d1; border-radius: 10px; box-sizing: border-box;">
        </div>

        <div style="border-top: 1px solid #ffe5ec; padding-top: 15px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">New Password</label>
            <input type="password" name="new_password" required style="width: 100%; padding: 12px; border: 2px solid #ffc2d1; border-radius: 10px; box-sizing: border-box;">
        </div>

        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Confirm New Password</label>
            <input type="password" name="confirm_new_password" required style="width: 100%; padding: 12px; border: 2px solid #ffc2d1; border-radius: 10px; box-sizing: border-box;">
        </div>

        <button type="submit" style="background-color: #000000; color: #ffffff; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px;">
            Update Password
        </button>
        
        <a href="/" style="text-align: center; color: #666; text-decoration: none; font-size: 0.9rem;">Cancel</a>
    </form>
</div>
{% endblock %}
