{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 50px auto; padding: 20px; background: white; border: 4px solid #ffc2d1; border-radius: 20px;">
    <h2 style="color: black;">What's on your mind?</h2>
    
    <form action="/create_message" method="post">
        <input type="hidden" name="csrf_token" value="{{ request.cookies.get('csrf_token') }}">
        <textarea name="content" required style="width: 100%; height: 150px; border: 2px solid #ffc2d1; border-radius: 10px; padding: 10px;"></textarea>
        
        <button type="submit" style="background: black; color: white; padding: 10px 20px; border-radius: 50px; margin-top: 10px; cursor: pointer; font-weight: bold;">
            Post Chirp
        </button>
    </form>
</div>
{% endblock %}
