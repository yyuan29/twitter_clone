{% extends "base.html" %}

{% block content %}

<h2>{{ profile_user.username }}'s Profile</h2>

<p><b>Bio:</b> {{ profile_user.bio }}</p>

<hr>

<h3>Posts</h3>

{% for m in messages %}
    <div class="message">
        <p>{{ m.content | safe }}</p>
        <small>{{ m.timestamp }}</small>
    </div>
{% endfor %}

{% endblock %}
