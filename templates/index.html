{% extends "base.html" %}
{% block content %}
    <h2>Home Feed</h2>
    <img src="{{ url_for('static', path='/images/logo.png') }}" width="100">

    {% for msg in messages %}
    <div style="border: 1px solid #ccc; margin: 10px; padding: 10px;">
        <p><strong>{{ msg.username }}</strong> (Age: {{ msg.age }})</p>
        <p>{{ msg.content }}</p>
        <small>{{ msg.timestamp }}</small>
    </div>
    {% endfor %}
{% endblock %}
