{% extends "base.html" %}
{% block content %}

    <div class="message-feed">
        {% for msg in messages %}
            <div class="message">
                <p><strong>{{ msg.username }}</strong> (Age: {{ msg.age }}) at {{ msg.timestamp }}</p>
                <p>{{ msg.text }}</p>
                <hr>
            </div>
        {% endfor %}
    </div>
{% endblock %}
