{% extends "base.html" %}
{% block content %}
    <h2>Recent Messages</h2>
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" width="100">
    
    {% for msg in messages %}
    <div class="message-box">
        <p><strong>{{ msg.user }}</strong> (Age: {{ msg.age }}) - <em>{{ msg.timestamp }}</em></p>
        <p>{{ msg.text }}</p>
    </div>
    <hr>
    {% endfor %}
{% endblock %}
