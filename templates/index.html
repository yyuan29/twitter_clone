<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdieMessages - Home</title>
    <style>
        :root {
            --birdie-pink: #fde2e4;
            --birdie-dark-pink: #ff4d6d;
            --birdie-border: #fad2d6;
            --nav-text: #444;
        }

        body {
            background-color: #fcfcfc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; color: #333;
        }

        .birdie-header {
            background-color: var(--birdie-pink);
            padding: 20px 0;
            border-bottom: 2px solid var(--birdie-border);
            text-align: center;
        }

        .logo-container { display: flex; flex-direction: column; align-items: center; }

        .title-nav h1 { font-size: 28px; margin: 0; font-weight: 800; color: #000; }
        
        .title-nav nav { margin: 15px 0; font-weight: 600; }

        .title-nav nav a {
            text-decoration: none;
            color: var(--nav-text);
            margin: 0 12px;
            transition: 0.2s;
        }

        .title-nav nav a:hover {
            color: var(--birdie-dark-pink);
        }

        /* SEARCH BAR */
        .search-box {
            display: inline-block;
        }

        .search-box input {
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
        }

        .search-box button {
            padding: 5px 10px;
            border-radius: 20px;
            border: none;
            background: var(--birdie-dark-pink);
            color: white;
            cursor: pointer;
        }

        .search-box button:hover {
            opacity: 0.8;
        }

        .lang-nav {
            font-size: 0.8em;
            margin-bottom: 10px;
        }

        .lang-nav a {
            color: #888;
            text-decoration: none;
            margin: 0 5px;
        }

        .lang-nav a.active {
            color: var(--birdie-dark-pink);
            font-weight: bold;
        }

        .container {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .feed-label {
            display: inline-block;
            background: #eee;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 20px;
            border-left: 5px solid var(--birdie-dark-pink);
        }

        .chirp-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
        }

        .avatar-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--birdie-dark-pink);
        }

        .username {
            color: var(--birdie-dark-pink);
            font-weight: bold;
            text-decoration: none;
        }

        .message-content {
            margin-top: 5px;
            line-height: 1.4;
            overflow-wrap: break-word;
        }

        .btn-action {
            color: #aaa;
            text-decoration: none;
            font-size: 0.85em;
            margin-right: 12px;
        }

        .btn-action:hover {
            color: var(--birdie-dark-pink);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }
    </style>
</head>

<body>

{% set t = get_t(request) %}

<header class="birdie-header">
    <div class="logo-container">

        <div class="lang-nav">
            <a href="/set_lang/en">EN</a> |
            <a href="/set_lang/fr">FR</a> |
            <a href="/set_lang/zh">中文</a>
        </div>

        <div class="title-nav">
            <h1>BirdieMessages</h1>

            <nav>

                <!-- HOME -->
                <a href="/">{{ t.home }}</a>

                <!-- SEARCH ADDED HERE (WORKS FOR LOGGED IN + OUT) -->
                <form action="/search" method="get" class="search-box" style="display:inline;">
                    <input type="text" name="q" placeholder="Search..." />
                    <button type="submit">🔍</button>
                </form>

                {% if user %}
                    <a href="/create_message">+ {{ t.post }}</a>
                    <a href="/profile/{{ user }}">{{ t.profile }}</a>
                    <a href="/logout">{{ t.logout }}</a>
                {% else %}
                    <a href="/login">{{ t.login }}</a>
                    <a href="/register">{{ t.register }}</a>
                {% endif %}

            </nav>
        </div>
    </div>
</header>

<div class="container">
    <div class="feed-label">{{ t.feed_label }}</div>

    {% for msg in messages %}
        <div class="chirp-card">
            <img class="avatar-circle"
                 src="https://api.dicebear.com/7.x/fun-emoji/svg?seed={{ msg.username }}">

            <div style="flex:1;">
                <a class="username" href="/profile/{{ msg.username }}">
                    @{{ msg.username }}
                </a>

                <div class="message-content">
                    {{ linkify(msg.content) | safe }}
                </div>
            </div>
        </div>
    {% endfor %}

</div>

</body>
</html>
