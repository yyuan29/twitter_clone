{% extends "base.html" %}
{% block content %}
    <h2>Recent Messages</h2>
    
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" width="100">

    <div class="message-container">
        {% for msg in messages %}
            <div class="message-card">
                <p><strong>{{ msg.username }}</strong> (Age: {{ msg.age }}) says:</p>
                <p>{{ msg.text }}</p>
                <small>Posted on: {{ msg.timestamp }}</small>
            </div>
            <hr>
        {% endfor %}
    </div>
{% endblock %}
