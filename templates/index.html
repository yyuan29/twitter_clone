{% for m in messages %}
<div class="message-item">
    <p><strong>{{ m.username }}</strong> (Age: {{ m.age }}) at {{ m.timestamp }}</p>
    <p>{{ linkify(m.content) | safe }}</p>

    {% if request.cookies.get("user_id") and request.cookies.get("user_id")|int == m.user_id %}
    <div class="actions">
        <a href="/edit_message/{{ m.id }}">Edit</a> |
        <a href="/delete_message/{{ m.id }}" style="color:red;">Delete</a>
    </div>
    {% endif %}

    <hr>
</div>
{% endfor %}
