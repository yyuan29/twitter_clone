{% extends "base.html" %}

{% block content %}
    <div class="feed">
        {% for m in messages %}
            <div class="message-item" style="margin-bottom: 20px;">
                <p><strong>{{ m.username }}</strong> (Age: {{ m.age }}) at {{ m.timestamp }}</p>
                
                <p style="margin-top: 10px;">{{ m.content }}</p>
                
                <hr style="border: 0.5px solid #eee;">
            </div>
        {% else %}
            <p>No messages found.</p>
        {% endfor %}
    </div>
{% endblock %}
